<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Analyzer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #faf7f2;
            --bg-panel: #ffffff;
            --ink: #1a1a1a;
            --ink-soft: #4a4a4a;
            --ink-muted: #8b8680;
            --ink-dim: #c4bfb8;
            --accent: #d4451c;
            --line: #e8e3dc;
            --highlight: #f3ead9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            line-height: 1.5;
            padding: 2rem 1.5rem;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 2.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--line);
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .brand {
            display: flex;
            align-items: baseline;
            gap: 0.8rem;
        }

        .brand h1 {
            font-family: 'Fraunces', serif;
            font-weight: 700;
            font-size: 2.2rem;
            letter-spacing: -0.02em;
            line-height: 1;
        }

        .brand-mark {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: var(--accent);
            border-radius: 50%;
            transform: translateY(-4px);
        }

        .tagline {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--ink-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 1.5rem;
        }

        @media (max-width: 820px) {
            .grid { grid-template-columns: 1fr; }
        }

        .editor {
            background: var(--bg-panel);
            border: 1px solid var(--line);
            border-radius: 4px;
            padding: 2rem;
            min-height: 500px;
            display: flex;
            flex-direction: column;
        }

        .editor-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--ink-muted);
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            margin-right: 0.4rem;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        textarea {
            flex: 1;
            border: none;
            outline: none;
            resize: none;
            font-family: 'Fraunces', serif;
            font-size: 1.1rem;
            line-height: 1.7;
            color: var(--ink);
            background: transparent;
            min-height: 420px;
        }

        textarea::placeholder {
            color: var(--ink-dim);
            font-style: italic;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .panel {
            background: var(--bg-panel);
            border: 1px solid var(--line);
            border-radius: 4px;
            padding: 1.5rem;
        }

        .panel-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--ink-muted);
            margin-bottom: 1.2rem;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem 1.5rem;
        }

        .stat {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .stat-value {
            font-family: 'Fraunces', serif;
            font-size: 2rem;
            font-weight: 600;
            color: var(--ink);
            line-height: 1;
            letter-spacing: -0.02em;
            font-variant-numeric: tabular-nums;
        }

        .stat-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--ink-muted);
        }

        .reading-time {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            padding: 0.9rem 1rem;
            background: var(--highlight);
            border-radius: 3px;
            margin-top: 0.2rem;
        }

        .reading-time-value {
            font-family: 'Fraunces', serif;
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--accent);
            font-variant-numeric: tabular-nums;
        }

        .reading-time-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--ink-soft);
        }

        .top-words {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .word-row {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.3rem 0;
        }

        .word-rank {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--ink-dim);
            width: 1.5rem;
            font-variant-numeric: tabular-nums;
        }

        .word-text {
            font-family: 'Fraunces', serif;
            font-size: 1rem;
            font-weight: 500;
            flex: 1;
            letter-spacing: -0.01em;
        }

        .word-bar-wrap {
            flex: 1.5;
            height: 6px;
            background: var(--line);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .word-bar {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            transition: width 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .word-count {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--ink-soft);
            font-variant-numeric: tabular-nums;
            min-width: 1.8rem;
            text-align: right;
        }

        .empty {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--ink-dim);
            text-align: center;
            padding: 1rem 0;
        }

        footer {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--line);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--ink-muted);
            text-align: center;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="brand">
                <h1>Text Analyzer<span class="brand-mark"></span></h1>
            </div>
            <div class="tagline">análisis en tiempo real</div>
        </header>

        <div class="grid">
            <div class="editor">
                <div class="editor-label">
                    <span><span class="status-dot"></span>escribiendo</span>
                    <span id="live-status">en espera</span>
                </div>
                <textarea id="text-input" placeholder="Pega o escribe tu texto aquí. El análisis se actualiza automáticamente a medida que escribes..."></textarea>
            </div>

            <aside class="sidebar">
                <div class="panel">
                    <div class="panel-title">estadísticas</div>
                    <div class="stats">
                        <div class="stat">
                            <div class="stat-value" id="stat-words">0</div>
                            <div class="stat-label">palabras</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value" id="stat-chars">0</div>
                            <div class="stat-label">caracteres</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value" id="stat-sentences">0</div>
                            <div class="stat-label">oraciones</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value" id="stat-paragraphs">0</div>
                            <div class="stat-label">párrafos</div>
                        </div>
                    </div>
                    <div class="reading-time">
                        <span class="reading-time-value" id="stat-reading">0s</span>
                        <span class="reading-time-label">tiempo de lectura</span>
                    </div>
                </div>

                <div class="panel">
                    <div class="panel-title">palabras frecuentes</div>
                    <div class="top-words" id="top-words">
                        <div class="empty">sin datos aún</div>
                    </div>
                </div>
            </aside>
        </div>

        <footer>
            v<span id="version">...</span> · text analyzer · Fundamentos de Docker - Universidad de los Andes
        </footer>
    </div>

    <script>
        const textInput = document.getElementById('text-input');
        const liveStatus = document.getElementById('live-status');

        const els = {
            words: document.getElementById('stat-words'),
            chars: document.getElementById('stat-chars'),
            sentences: document.getElementById('stat-sentences'),
            paragraphs: document.getElementById('stat-paragraphs'),
            reading: document.getElementById('stat-reading'),
            topWords: document.getElementById('top-words'),
            version: document.getElementById('version'),
        };

        let debounceTimer = null;

        async function loadConfig() {
            try {
                const res = await fetch('/api/config');
                const cfg = await res.json();
                els.version.textContent = cfg.app_version;
            } catch {
                els.version.textContent = '1.0.0';
            }
        }

        async function analyze(text) {
            if (!text.trim()) {
                renderEmpty();
                liveStatus.textContent = 'en espera';
                return;
            }

            liveStatus.textContent = 'analizando...';

            try {
                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text }),
                });
                const data = await res.json();
                render(data);
                liveStatus.textContent = 'actualizado';
            } catch {
                liveStatus.textContent = 'error';
            }
        }

        function formatReadingTime(minutes, seconds) {
            if (minutes === 0) return `${seconds}s`;
            if (seconds === 0) return `${minutes}m`;
            return `${minutes}m ${seconds}s`;
        }

        function render(data) {
            els.words.textContent = data.words.toLocaleString('es');
            els.chars.textContent = data.characters.toLocaleString('es');
            els.sentences.textContent = data.sentences.toLocaleString('es');
            els.paragraphs.textContent = data.paragraphs.toLocaleString('es');
            els.reading.textContent = formatReadingTime(
                data.reading_time_minutes,
                data.reading_time_seconds
            );

            if (data.top_words.length === 0) {
                els.topWords.innerHTML = '<div class="empty">sin palabras significativas</div>';
                return;
            }

            const maxCount = data.top_words[0].count;
            els.topWords.innerHTML = data.top_words.map((w, i) => `
                <div class="word-row">
                    <span class="word-rank">${(i + 1).toString().padStart(2, '0')}</span>
                    <span class="word-text">${w.word}</span>
                    <div class="word-bar-wrap">
                        <div class="word-bar" style="width: ${(w.count / maxCount * 100).toFixed(1)}%"></div>
                    </div>
                    <span class="word-count">${w.count}</span>
                </div>
            `).join('');
        }

        function renderEmpty() {
            els.words.textContent = '0';
            els.chars.textContent = '0';
            els.sentences.textContent = '0';
            els.paragraphs.textContent = '0';
            els.reading.textContent = '0s';
            els.topWords.innerHTML = '<div class="empty">sin datos aún</div>';
        }

        textInput.addEventListener('input', (e) => {
            liveStatus.textContent = 'escribiendo...';
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => analyze(e.target.value), 300);
        });

        loadConfig();
    </script>
</body>
</html>
